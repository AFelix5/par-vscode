scopeName: source.par
patterns:
  - include: "#comments"
  - include: "#strings"
  - include: "#numbers"
  - include: "#definitions"
  - include: "#keywords"
  - include: "#dot-keywords"
  - include: "#selections"
  - include: "#types"
  - include: "#names"
repository:
  comments:
    patterns:
      - include: "#block-comment"
      - name: comment.line.double-slash
        match: (//).*$
  block-comment:
    name: comment.block
    begin: /\*(?!\*)
    end: \*/
    patterns:
      - include: "#block-comment"
  strings:
    patterns:
      - begin: '"'
        end: '"'
        name: string.quoted.double
        patterns:
          - include: "#string-escape"
      - begin: "'"
        end: "'"
        name: constant.character
        patterns:
          - include: "#string-escape"
  string-escape:
    name: constant.character.escape
    match: \\(b|f|n|r|t|'|"|\\|/|[0-7]{3}|u\{[\da-fA-F]+\}|u[\da-fA-F]{4}|x[\da-fA-F]{2})
  numbers:
    patterns:
      - name: constant.numeric
        match: \b(-|\+)?\d[\d_]*\b
  keywords:
    patterns:
      - match: \b(begin|loop|catch|throw|try|unfounded)(@[a-z_][\w\d_]*)\b
        captures:
          1: { name: keyword.control }
          2: { name: constant.other }
      - match: \b(recursive|iterative|self)(@[a-z_][\w\d_]*)\b
        captures:
          1: { name: keyword.other }
          2: { name: constant.other }
      - name: keyword.declaration
        match: \b(dec|def|type|let)\b
      - name: keyword.control
        match: \b(do|case|in|chan|begin|loop|unfounded|catch|throw|try|default)\b
      - name: keyword.other
        match: \b(either|choice|recursive|iterative|self|box|dual|telltypes)\b
      - name: keyword.operator
        match: '!'
  dot-keywords:
    patterns:
      - match: (\.)\s*(case|catch|try|begin|loop|unfounded|default)(@([a-z_][\w\d_]*))?
        captures:
          1: { name: punctuation.accessor.dot }
          2: { name: keyword.control }
          3: { name: constant.other }
  definitions:
    patterns:
      - match: \b(dec)\s+([A-Z][\w\d_]*)
        captures:
          1: { name: keyword.declaration }
          2: { name: entity.name.function }
      - match: \b(def)\s+([A-Z][\w\d_]*)
        captures:
          1: { name: keyword.declaration }
          2: { name: entity.name.function }
      - match: \b(type)\s+([A-Z][\w\d_]*)
        captures:
          1: { name: keyword.declaration }
          2: { name: entity.name.type }
  selections:
    patterns:
      - match: (\.)\s*([a-z_][\w\d_]*)
        captures:
          1: { name: punctuation.accessor.dot }
          2: { name: support.function }
  types:
    patterns:
      - match: \b([A-Z][\w\d_]*)\s*(\.)\s*([A-Z][\w\d_]*)\b
        captures:
          1: { name: entity.name.type }
          2: { name: punctuation.accessor.dot }
          3: { name: entity.name.type }
      - match: \b([A-Z][\w\d_]*)\b
        captures:
          1: { name: entity.name.type }
  names:
    patterns:
      - match: \b[a-z_][\w\d_]*\b
        name: variable.other
